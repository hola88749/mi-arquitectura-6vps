name: Deploy Multi-VPS
on:
  push:
    branches: [ main ]

jobs:
  deploy-gateway:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Config and Restart Nginx
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_GATEWAY }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Crear carpeta con permisos del usuario actual
            mkdir -p /home/${{ secrets.SSH_USER }}/proyecto
            
            # 2. Crear el archivo (Uso de comillas en EOF para evitar expansión de variables)
            cat <<'EOF' > /home/${{ secrets.SSH_USER }}/proyecto/microservicios
            server {
                listen 80;
                server_name 20.171.127.68;
                location / {
                    return 200 'Gateway Activo - Conserflow';
                    add_header Content-Type text/plain;
                }
            }
            EOF

            # 3. Mover a Nginx usando sudo (aquí es donde podría pedir pass)
            # Usamos -n para que falle rápido si pide password en lugar de quedarse colgado
            sudo -n cp -f /home/${{ secrets.SSH_USER }}/proyecto/microservicios /etc/nginx/conf.d/
            sudo -n nginx -t && sudo -n systemctl restart nginx
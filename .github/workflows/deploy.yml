name: Deploy Multi-VPS
on:
  push:
    branches: [ main ]

jobs:
  deploy-gateway:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Config and Restart Nginx
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_GATEWAY }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Crear la carpeta de aterrizaje
            sudo mkdir -p /home/proyecto
            sudo chown -R $USER:$USER /home/proyecto
            
            # Crear el archivo directamente desde el script (Saltamos el SCP)
            cat <<EOF > /home/proyecto/microservicios
            server {
                listen 80;
                server_name 20.171.127.68;
                location / {
                    root /var/www/html;
                    index index.html;
                }
            }
            EOF

            # Mover a Nginx y reiniciar
            sudo mkdir -p /etc/nginx/conf.d/
            sudo cp -f /home/proyecto/microservicios /etc/nginx/conf.d/
            sudo nginx -t && sudo systemctl restart nginx